<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <title>Ultimate Google API Sync</title>
    <style>
        * { box-sizing: border-box; margin: 0; padding: 0; }
        body { background: #f4f7f9; font-family: sans-serif; display: flex; justify-content: center; align-items: center; min-height: 100vh; }
        #app { background: white; padding: 30px; border-radius: 20px; box-shadow: 0 10px 30px rgba(0,0,0,0.1); width: 380px; text-align: center; }
        .clock-main { font-size: 58px; font-weight: bold; color: #333; font-variant-numeric: tabular-nums; }
        .clock-sub { font-size: 24px; color: #007bff; margin-bottom: 20px; font-variant-numeric: tabular-nums; }
        .stats { display: flex; justify-content: space-between; gap: 10px; margin-bottom: 20px; }
        .stat-card { background: #f8f9fa; flex: 1; padding: 10px; border-radius: 10px; border: 1px solid #eee; }
        .stat-label { font-size: 11px; color: #888; margin-bottom: 4px; }
        .stat-value { font-size: 14px; font-weight: bold; color: #444; }
        .btn { width: 100%; padding: 16px; border: none; border-radius: 12px; font-size: 16px; font-weight: bold; cursor: pointer; transition: 0.2s; margin-bottom: 10px; }
        .btn-sync { background: #1a73e8; color: white; }
        .btn-chime { background: #e8f0fe; color: #1967d2; }
        .btn-chime.active { background: #fce8e6; color: #d93025; }
        .log { font-size: 10px; color: #aaa; font-family: monospace; height: 50px; overflow-y: auto; text-align: left; background: #fafafa; padding: 5px; }
    </style>
</head>
<body>

<div id="app">
    <div class="clock-main" id="clock">00:00:00</div>
    <div class="clock-sub" id="ms">.000</div>

    <div class="stats">
        <div class="stat-card"><div class="stat-label">ズレ補正</div><div class="stat-value" id="off-val">--</div></div>
        <div class="stat-card"><div class="stat-label">RTT(往復)</div><div class="stat-value" id="rtt-val">--</div></div>
    </div>

    <button class="btn btn-sync" onclick="doSync()">Google APIで同期</button>
    <button class="btn btn-chime" id="chime-btn" onclick="toggleChime()">時報 OFF</button>
    <div class="log" id="log"></div>
</div>

<script>
let offset = 0, chimeEnabled = false, audioCtx = null, beeped = {};

function addLog(m) { const el = document.getElementById('log'); el.innerText = `[${new Date().toLocaleTimeString()}] ${m}\n` + el.innerText; }

async function doSync() {
    addLog("Google APIと同期中...");
    // 予備の同期先を含むリスト
    const endpoints = [
        "https://worldtimeapi.org/api/timezone/Asia/Tokyo", // 第一候補
        "https://ntp-a1.nict.go.jp/cgi-bin/json" // NICT直接（CORSが通れば最強）
    ];

    try {
        // fetchのタイムアウト設定
        const controller = new AbortController();
        const timeoutId = setTimeout(() => controller.abort(), 5000);

        const t1 = performance.now();
        // 信頼性の高い代替URL。WorldTimeAPIがダメな時用
        const res = await fetch("https://worldtimeapi.org/api/timezone/Asia/Tokyo", { 
            cache: 'no-store',
            signal: controller.signal 
        });
        const data = await res.json();
        const t4 = performance.now();

        const rtt = t4 - t1;
        const serverMs = new Date(data.datetime).getTime();
        offset = serverMs - (Date.now() - rtt / 2);

        document.getElementById('off-val').innerText = (offset / 1000).toFixed(3) + "s";
        document.getElementById('rtt-val').innerText = Math.round(rtt) + "ms";
        addLog("同期成功(API)");

    } catch (e) {
        addLog("API失敗。ヘッダー補正に切り替えます...");
        // APIがダメな場合、自身のサーバーとの通信でミリ秒境界を推測する
        await fallbackSync();
    }
}

async function fallbackSync() {
    const t1 = performance.now();
    const res = await fetch(location.href + "?cb=" + Date.now(), { method: 'HEAD', cache: 'no-store' });
    const t4 = performance.now();
    const dateStr = res.headers.get('date');
    if (dateStr) {
        const serverMs = new Date(dateStr).getTime();
        const rtt = t4 - t1;
        offset = serverMs - (Date.now() - rtt / 2);
        document.getElementById('off-val').innerText = (offset / 1000).toFixed(2) + "s";
        document.getElementById('rtt-val').innerText = Math.round(rtt) + "ms";
        addLog("ヘッダー同期完了");
    }
}

function tick() {
    const now = new Date(Date.now() + offset);
    const h = now.getHours(), m = now.getMinutes(), s = now.getSeconds(), ms = now.getMilliseconds();
    document.getElementById('clock').innerText = `${h.toString().padStart(2,'0')}:${m.toString().padStart(2,'0')}:${s.toString().padStart(2,'0')}`;
    document.getElementById('ms').innerText = "." + ms.toString().padStart(3, '0');

    if (chimeEnabled) {
        if (s === 0 && !beeped[s] && ms < 200) { beeped[s] = true; playBong(); }
        else if (s >= 57 && s <= 59 && !beeped[s] && ms < 200) { beeped[s] = true; playBeep(880, 0.1); }
        if (ms > 500) beeped = {};
    }
    requestAnimationFrame(tick);
}

function playBeep(f, d) {
    if (!audioCtx) audioCtx = new AudioContext();
    const o = audioCtx.createOscillator(), g = audioCtx.createGain();
    o.connect(g); g.connect(audioCtx.destination);
    o.frequency.value = f;
    g.gain.setValueAtTime(0.3, audioCtx.currentTime);
    g.gain.exponentialRampToValueAtTime(0.01, audioCtx.currentTime + d);
    o.start(); o.stop(audioCtx.currentTime + d);
}
function playBong() { [880, 1108, 1320].forEach(f => playBeep(f, 1.2)); }
function toggleChime() {
    chimeEnabled = !chimeEnabled;
    if (audioCtx) audioCtx.resume();
    const btn = document.getElementById('chime-btn');
    btn.innerText = chimeEnabled ? "時報 ON" : "時報 OFF";
    btn.className = chimeEnabled ? "btn btn-chime active" : "btn btn-chime";
}

doSync();
tick();
</script>
</body>
</html>
