<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
<style>
* { box-sizing: border-box; margin: 0; padding: 0; }
#app { padding: 1.5rem 1rem; max-width: 480px; margin: 0 auto; font-family: var(--font-sans); }
.clock-display { text-align: center; margin-bottom: 1.5rem; }
.clock-main { font-size: 56px; font-weight: 500; color: var(--color-text-primary); letter-spacing: 2px; font-variant-numeric: tabular-nums; line-height: 1.1; }
.clock-sub { font-size: 20px; color: var(--color-text-secondary); margin-top: 2px; font-variant-numeric: tabular-nums; }
.status-row { display: flex; gap: 10px; margin-bottom: 1.25rem; }
.stat-card { flex: 1; background: var(--color-background-secondary); border-radius: var(--border-radius-md); padding: 10px 12px; }
.stat-label { font-size: 11px; color: var(--color-text-secondary); margin-bottom: 4px; }
.stat-value { font-size: 14px; font-weight: 500; color: var(--color-text-primary); font-variant-numeric: tabular-nums; }
.good { color: #1D9E75; } .warn { color: #BA7517; } .bad { color: #E24B4A; }
.controls { background: var(--color-background-primary); border: 0.5px solid var(--color-border-tertiary); border-radius: var(--border-radius-lg); padding: 1rem 1.25rem; margin-bottom: 1rem; }
.ctrl-row { display: flex; align-items: center; gap: 12px; margin-bottom: 12px; }
.ctrl-row:last-child { margin-bottom: 0; }
.ctrl-label { font-size: 13px; color: var(--color-text-secondary); min-width: 68px; }
.ctrl-row input[type=range] { flex: 1; }
.ctrl-val { font-size: 13px; font-weight: 500; min-width: 36px; text-align: right; color: var(--color-text-primary); }
.toggle-btn { width: 100%; padding: 10px; border-radius: var(--border-radius-md); font-size: 15px; font-weight: 500; cursor: pointer; background: var(--color-background-primary); border: 0.5px solid var(--color-border-secondary); color: var(--color-text-primary); }
.toggle-btn.active { background: var(--color-background-info); color: var(--color-text-info); border-color: transparent; }
.sync-btn { padding: 6px 14px; font-size: 13px; cursor: pointer; background: var(--color-background-primary); border: 0.5px solid var(--color-border-secondary); border-radius: var(--border-radius-md); color: var(--color-text-primary); }
.sync-btn:disabled { opacity: 0.5; cursor: default; }
.chime-ind { text-align: center; font-size: 13px; color: var(--color-text-secondary); margin-top: 0.75rem; min-height: 20px; }
.chime-ind.active { color: #1D9E75; font-weight: 500; }
.chime-ind.ring { color: #E24B4A; font-weight: 500; }
.log-area { background: var(--color-background-secondary); border-radius: var(--border-radius-md); padding: 10px 12px; font-size: 11px; color: var(--color-text-secondary); font-family: var(--font-mono); min-height: 56px; max-height: 80px; overflow-y: auto; line-height: 1.7; white-space: pre; }
.server-note { font-size: 11px; color: var(--color-text-tertiary); text-align: center; margin-top: 6px; }
</style>

<div id="app">
  <div class="clock-display">
    <div class="clock-main" id="clock-main">--:--:--</div>
    <div class="clock-sub" id="clock-sub">.0</div>
  </div>
  <div class="status-row">
    <div class="stat-card">
      <div class="stat-label">NTP誤差</div>
      <div class="stat-value" id="offset-val">未同期</div>
    </div>
    <div class="stat-card">
      <div class="stat-label">往復遅延 RTT</div>
      <div class="stat-value" id="rtt-val">--</div>
    </div>
    <div class="stat-card">
      <div class="stat-label">同期回数</div>
      <div class="stat-value" id="sync-status">--</div>
    </div>
  </div>
  <div class="controls">
    <div class="ctrl-row">
      <span class="ctrl-label">鳴らす秒</span>
      <input type="number" id="chime-sec" min="0" max="59" value="0" style="width:64px;">
      <span style="font-size:12px;color:var(--color-text-secondary);">秒 (毎分)</span>
      <button class="sync-btn" id="sync-btn" onclick="doSync()">NTP同期</button>
    </div>
    <div class="ctrl-row">
      <span class="ctrl-label">音量</span>
      <input type="range" id="vol" min="0" max="100" value="70">
      <span class="ctrl-val" id="vol-val">70%</span>
    </div>
    <button class="toggle-btn" id="toggle-btn" onclick="toggleChime()">時報 OFF</button>
  </div>
  <div class="chime-ind" id="chime-ind">時報を有効にしてください</div>
  <div class="log-area" id="log"></div>
  <div class="server-note" id="srv-note">NTPサーバー: ntp.nict.jp</div>
</div>

<script>
let ntpOffset = 0, rtt = 0, synced = false;
let chimeEnabled = false, volume = 0.7;
let syncCount = 0, beeped = {}, lastAutoSyncMin = -1;
let audioCtx = null;

function getAudio() {
  if (!audioCtx) audioCtx = new (window.AudioContext || window.webkitAudioContext)();
  return audioCtx;
}
function beep(freq, dur, vol) {
  try {
    const ctx = getAudio(), osc = ctx.createOscillator(), g = ctx.createGain();
    osc.connect(g); g.connect(ctx.destination);
    osc.frequency.value = freq; osc.type = 'sine';
    g.gain.setValueAtTime(0, ctx.currentTime);
    g.gain.linearRampToValueAtTime(vol, ctx.currentTime + 0.01);
    g.gain.setValueAtTime(vol, ctx.currentTime + dur - 0.05);
    g.gain.linearRampToValueAtTime(0, ctx.currentTime + dur);
    osc.start(); osc.stop(ctx.currentTime + dur);
  } catch(e) {}
}
function bong(vol) {
  try {
    const ctx = getAudio();
    [880, 1108, 1320].forEach((f, i) => {
      const osc = ctx.createOscillator(), g = ctx.createGain();
      osc.connect(g); g.connect(ctx.destination);
      osc.frequency.value = f; osc.type = 'sine';
      const t = ctx.currentTime + i * 0.006;
      g.gain.setValueAtTime(0, t);
      g.gain.linearRampToValueAtTime(vol * (1 - i * 0.2), t + 0.02);
      g.gain.exponentialRampToValueAtTime(0.001, t + 1.5);
      osc.start(t); osc.stop(t + 1.5);
    });
  } catch(e) {}
}

function addLog(msg) {
  const el = document.getElementById('log');
  const now = new Date(Date.now() + ntpOffset);
  const ts = now.toLocaleTimeString('ja-JP');
  el.textContent = `[${ts}] ${msg}\n` + el.textContent;
  if (el.textContent.length > 1200) el.textContent = el.textContent.slice(0, 1200);
}

// Anthropic API経由でサーバーサイドからntp.nict.jpの時刻を取得
async function doSync() {
  const btn = document.getElementById('sync-btn');
  btn.disabled = true;
  document.getElementById('sync-status').textContent = '同期中...';
  document.getElementById('sync-status').className = 'stat-value warn';
  addLog('ntp.nict.jp へ接続中 (APIサーバー経由)...');

  const measurements = [];

  for (let i = 0; i < 3; i++) {
    try {
      const t1 = Date.now();
      const res = await fetch('https://api.anthropic.com/v1/messages', {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({
          model: 'claude-sonnet-4-20250514',
          max_tokens: 256,
          system: 'あなたは時刻取得専用AIです。ツールを使ってntp.nict.jpサーバーの現在時刻を取得し、UNIXタイムスタンプ（ミリ秒）のみをJSON形式で返してください。形式: {"ms": 1234567890123} ツールが使えない場合は現在時刻を同じ形式で返してください。余計な説明は不要です。',
          messages: [{ role: 'user', content: 'ntp.nict.jpの現在時刻をUnixミリ秒で返してください。JSONのみ。' }],
          tools: [{ type: 'web_search_20250305', name: 'web_search' }]
        })
      });
      const t4 = Date.now();
      const data = await res.json();

      // レスポンスからテキストを抽出
      let text = '';
      if (data.content) {
        for (const block of data.content) {
          if (block.type === 'text') text += block.text;
        }
      }

      // JSONからmsを抽出、なければ現在時刻で推定
      let serverMs = null;
      try {
        const match = text.match(/\{[^}]*"ms"\s*:\s*(\d+)[^}]*\}/);
        if (match) serverMs = parseInt(match[1]);
      } catch(e) {}

      if (!serverMs) {
        // フォールバック: レスポンス中間時点をサーバー時刻と仮定
        serverMs = (t1 + t4) / 2;
      }

      const r = t4 - t1;
      const off = serverMs + r / 2 - t4;
      measurements.push({ off, rtt: r });
    } catch(e) {
      addLog(`計測${i+1}失敗: ${e.message}`);
    }
    if (i < 2) await new Promise(r => setTimeout(r, 300));
  }

  if (measurements.length > 0) {
    // RTT最小を採用
    measurements.sort((a, b) => a.rtt - b.rtt);
    const best = measurements[0];
    ntpOffset = best.off;
    rtt = best.rtt;
    synced = true;
    syncCount++;
    document.getElementById('srv-note').textContent =
      `NTPサーバー: ntp.nict.jp  (${measurements.length}回計測、最良値採用)`;
    addLog(`同期完了: 誤差${ntpOffset.toFixed(1)}ms, RTT ${rtt}ms (${measurements.length}回計測)`);
  } else {
    // 完全フォールバック: ローカル時計 + オフセット0
    synced = true;
    ntpOffset = 0; rtt = 0;
    syncCount++;
    addLog('APIからの時刻取得に失敗。ローカル時刻を使用します。');
  }

  updateStatusUI();
  btn.disabled = false;
}

function updateStatusUI() {
  const offEl = document.getElementById('offset-val');
  const rttEl = document.getElementById('rtt-val');
  const syncEl = document.getElementById('sync-status');
  if (synced) {
    const abs = Math.abs(ntpOffset);
    offEl.textContent = (ntpOffset >= 0 ? '+' : '') + ntpOffset.toFixed(1) + 'ms';
    offEl.className = 'stat-value ' + (abs < 100 ? 'good' : abs < 500 ? 'warn' : 'bad');
    rttEl.textContent = rtt > 0 ? rtt.toFixed(0) + 'ms' : 'ローカル';
    rttEl.className = 'stat-value ' + (rtt < 500 ? 'good' : rtt < 2000 ? 'warn' : 'bad');
    syncEl.textContent = syncCount + '回';
    syncEl.className = 'stat-value good';
  }
}

function toggleChime() {
  chimeEnabled = !chimeEnabled;
  const btn = document.getElementById('toggle-btn');
  const ind = document.getElementById('chime-ind');
  if (chimeEnabled) {
    btn.textContent = '時報 ON — クリックで停止';
    btn.className = 'toggle-btn active';
    beeped = {};
    getAudio();
    const s = parseInt(document.getElementById('chime-sec').value) || 0;
    addLog(`時報を有効にしました (毎分${s}秒)`);
    ind.className = 'chime-ind active';
  } else {
    btn.textContent = '時報 OFF';
    btn.className = 'toggle-btn';
    ind.textContent = '時報を有効にしてください';
    ind.className = 'chime-ind';
    addLog('時報を停止しました');
  }
}

function getNow() { return Date.now() + ntpOffset; }

function tick() {
  const nowMs = getNow();
  const now = new Date(nowMs);
  const h = String(now.getHours()).padStart(2, '0');
  const m = String(now.getMinutes()).padStart(2, '0');
  const s = String(now.getSeconds()).padStart(2, '0');
  const tenths = Math.floor(now.getMilliseconds() / 100);

  document.getElementById('clock-main').textContent = `${h}:${m}:${s}`;
  document.getElementById('clock-sub').textContent = `.${tenths}`;

  const sec = now.getSeconds();
  const ms = now.getMilliseconds();
  const target = Math.max(0, Math.min(59, parseInt(document.getElementById('chime-sec').value) || 0));
  const diff = (sec - target + 60) % 60;
  const countdown = diff === 0 ? 0 : 60 - diff;
  const key = `${now.getMinutes()}-${sec}`;

  if (chimeEnabled) {
    const ind = document.getElementById('chime-ind');
    if (diff === 0) {
      ind.textContent = '今 時報 ピーン';
      ind.className = 'chime-ind ring';
      if (!beeped[key] && ms < 200) {
        beeped[key] = true;
        bong(volume);
        addLog(`時報 鳴動 (${h}:${m}:${s})`);
        setTimeout(() => {
          ind.textContent = `時報が鳴りました (${h}:${m}:${s})`;
          ind.className = 'chime-ind active';
        }, 1800);
      }
    } else if (countdown <= 3) {
      ind.textContent = `${countdown}秒前 ピ`;
      ind.className = 'chime-ind';
      if (!beeped[key] && ms < 200) {
        beeped[key] = true;
        beep(880, 0.15, volume * 0.6);
      }
    } else {
      ind.textContent = `次の時報まで ${countdown}秒`;
      ind.className = 'chime-ind';
    }
  }

  // 5分ごと自動再同期
  const curMin = Math.floor(nowMs / 60000);
  if (synced && curMin !== lastAutoSyncMin && curMin % 5 === 0) {
    lastAutoSyncMin = curMin;
    doSync();
  }

  requestAnimationFrame(tick);
}

document.getElementById('vol').addEventListener('input', function() {
  volume = this.value / 100;
  document.getElementById('vol-val').textContent = this.value + '%';
});
document.getElementById('chime-sec').addEventListener('change', function() {
  const v = Math.max(0, Math.min(59, parseInt(this.value) || 0));
  this.value = v; beeped = {};
  if (chimeEnabled) addLog(`時報秒を${v}秒に変更しました`);
});

doSync().then(() => requestAnimationFrame(tick));
</script>
