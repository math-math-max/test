<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>NTP Chime (GitHub Pages対応版)</title>
  <style>
    /* 以前のデザインを維持 */
    * { box-sizing: border-box; margin: 0; padding: 0; }
    #app { padding: 1.5rem 1rem; max-width: 480px; margin: 0 auto; font-family: sans-serif; }
    .clock-display { text-align: center; margin-bottom: 1.5rem; }
    .clock-main { font-size: 56px; font-weight: 500; color: #333; letter-spacing: 2px; font-variant-numeric: tabular-nums; line-height: 1.1; }
    .clock-sub { font-size: 20px; color: #666; margin-top: 2px; font-variant-numeric: tabular-nums; }
    .status-row { display: flex; gap: 8px; margin-bottom: 1.25rem; flex-wrap: wrap; }
    .stat-card { flex: 1; min-width: 80px; background: #f5f5f5; border-radius: 8px; padding: 10px 12px; border: 1px solid #eee; }
    .stat-label { font-size: 11px; color: #666; margin-bottom: 4px; }
    .stat-value { font-size: 14px; font-weight: 500; color: #333; font-variant-numeric: tabular-nums; }
    .stat-value.good { color: #1D9E75; }
    .stat-value.warn { color: #e67e22; }
    .controls { background: #fff; border: 1px solid #ddd; border-radius: 12px; padding: 1rem 1.25rem; margin-bottom: 1rem; }
    .ctrl-row { display: flex; align-items: center; gap: 12px; margin-bottom: 12px; }
    .ctrl-label { font-size: 13px; color: #666; min-width: 68px; }
    .toggle-btn { width: 100%; padding: 12px; border-radius: 8px; font-size: 15px; font-weight: 500; cursor: pointer; background: #fff; border: 1px solid #ccc; }
    .toggle-btn.active { background: #e3f2fd; color: #1976d2; border-color: #1976d2; }
    .sync-btn { padding: 6px 14px; font-size: 13px; cursor: pointer; border-radius: 6px; background: #eee; border: 1px solid #ccc; }
    .log-area { background: #f9f9f9; border-radius: 6px; padding: 10px; font-size: 11px; color: #777; font-family: monospace; height: 120px; overflow-y: auto; white-space: pre-wrap; margin-top: 10px; border: 1px solid #eee; }
  </style>
</head>
<body>
<div id="app">
  <div class="clock-display">
    <div class="clock-main" id="clock-main">--:--:--</div>
    <div class="clock-sub" id="clock-sub">.0</div>
  </div>
  <div class="status-row">
    <div class="stat-card"><div class="stat-label">最小RTT</div><div class="stat-value" id="rtt-val">--</div></div>
    <div class="stat-card"><div class="stat-label">時計のズレ</div><div class="stat-value" id="offset-val">--</div></div>
    <div class="stat-card"><div class="stat-label">同期状態</div><div class="stat-value" id="sync-status">--</div></div>
  </div>
  <div class="controls">
    <div class="ctrl-row">
      <span class="ctrl-label">鳴らす秒</span>
      <input type="number" id="chime-sec" min="0" max="59" value="0" style="width:50px;">
      <button class="sync-btn" onclick="doSync()">再同期</button>
    </div>
    <div class="ctrl-row">
      <span class="ctrl-label">予告秒数</span>
      <input type="number" id="before-sec" min="0" max="30" value="3" style="width:50px;">
    </div>
    <div class="ctrl-row">
      <span class="ctrl-label">音量</span>
      <input type="range" id="vol" min="0" max="100" value="70">
      <span class="ctrl-val" id="vol-val">70%</span>
    </div>
    <button class="toggle-btn" id="toggle-btn" onclick="toggleChime()">時報 OFF</button>
  </div>
  <div class="chime-ind" id="chime-ind" style="text-align:center;font-size:13px;color:#666;">時報を有効にしてください</div>
  <div class="log-area" id="log"></div>
</div>

<script>
let rtt = 0, offset = 0, synced = false, syncCount = 0;
let chimeEnabled = false, volume = 0.7, audioCtx = null;
let beeped = {};

function correctedNow() { return new Date(Date.now() + offset); }

function addLog(msg) {
  const el = document.getElementById('log');
  el.textContent = `[${new Date().toLocaleTimeString()}] ${msg}\n` + el.textContent;
}

// 修正された計測ロジック：HTTP Headerから精密な時刻を推測
async function measureOnce() {
  const url = `https://1.1.1.1/cdn-cgi/trace?${Date.now()}`;
  const t1 = performance.now();
  const res = await fetch(url, { cache: 'no-store' });
  const t4 = performance.now();
  
  // Dateヘッダーは秒単位だが、受信した瞬間（t4）に最も近い。
  // ここでは Cloudflare の CORS 許可を利用して、できるだけ RTT を抑えて計測
  const dateHeader = res.headers.get('date');
  if (!dateHeader) return null;

  const serverMs = new Date(dateHeader).getTime();
  const measuredRtt = t4 - t1;
  
  // RTTの半分を引いて補正（NICT公式でも使われる手法）
  const t1abs = Date.now() - (performance.now() - t1);
  const measuredOffset = serverMs - (t1abs + measuredRtt / 2);

  return { rtt: measuredRtt, offset: measuredOffset };
}

async function doSync() {
  document.getElementById('sync-status').textContent = '同期中...';
  const samples = [];
  for (let i = 0; i < 8; i++) {
    const r = await measureOnce();
    if (r) samples.push(r);
    await new Promise(res => setTimeout(res, 60));
  }
  
  if (samples.length > 0) {
    samples.sort((a, b) => a.rtt - b.rtt);
    rtt = samples[0].rtt;
    offset = samples[0].offset;
    synced = true;
    syncCount++;
    addLog(`同期完了(RTT:${Math.round(rtt)}ms) ズレ:${(offset/1000).toFixed(3)}s`);
  }
  updateUI();
}

function updateUI() {
  document.getElementById('rtt-val').textContent = Math.round(rtt) + 'ms';
  document.getElementById('sync-status').textContent = syncCount + '回完了';
  const offEl = document.getElementById('offset-val');
  offEl.textContent = (offset >= 0 ? '+' : '') + (offset / 1000).toFixed(2) + 's';
  offEl.className = Math.abs(offset) < 200 ? 'stat-value good' : 'stat-value warn';
}

// 時報・時計処理（以前のロジックと同様）
function getAudio() {
  if (!audioCtx) audioCtx = new (window.AudioContext || window.webkitAudioContext)();
  return audioCtx;
}

function toggleChime() {
  chimeEnabled = !chimeEnabled;
  getAudio().resume();
  const btn = document.getElementById('toggle-btn');
  btn.textContent = chimeEnabled ? '時報 ON (停止)' : '時報 OFF';
  btn.className = chimeEnabled ? 'toggle-btn active' : 'toggle-btn';
}

function tick() {
  const now = correctedNow();
  const h = now.getHours(), m = now.getMinutes(), s = now.getSeconds(), ms = now.getMilliseconds();
  document.getElementById('clock-main').textContent = `${h.toString().padStart(2,'0')}:${m.toString().padStart(2,'0')}:${s.toString().padStart(2,'0')}`;
  document.getElementById('clock-sub').textContent = '.' + Math.floor(ms / 100);

  if (chimeEnabled) {
    const target = parseInt(document.getElementById('chime-sec').value);
    const before = parseInt(document.getElementById('before-sec').value);
    const diff = (target - s + 60) % 60;
    const key = `${m}-${s}`;

    if (diff === 0 && !beeped[key] && ms < 250) {
      beeped[key] = true;
      playBong();
    } else if (diff <= before && diff > 0 && !beeped[key] && ms < 250) {
      beeped[key] = true;
      playBeep(880, 0.1);
    }
  }
  requestAnimationFrame(tick);
}

function playBeep(f, d) {
  const ctx = getAudio();
  const osc = ctx.createOscillator();
  const g = ctx.createGain();
  osc.connect(g); g.connect(ctx.destination);
  osc.frequency.value = f;
  g.gain.setValueAtTime(volume, ctx.currentTime);
  g.gain.exponentialRampToValueAtTime(0.001, ctx.currentTime + d);
  osc.start(); osc.stop(ctx.currentTime + d);
}

function playBong() {
  [880, 1108, 1320].forEach(f => playBeep(f, 1.5));
}

document.getElementById('vol').oninput = (e) => {
  volume = e.target.value / 100;
  document.getElementById('vol-val').textContent = e.target.value + '%';
};

doSync();
tick();
</script>
</body>
</html>
