<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>NTP Chime (NICT同期版)</title>
  <style>
    /* デザインは元のスタイルを継承しつつ、NICTカラー（ブルー系）に調整 */
    * { box-sizing: border-box; margin: 0; padding: 0; }
    #app { padding: 1.5rem 1rem; max-width: 480px; margin: 0 auto; font-family: sans-serif; }
    .clock-display { text-align: center; margin-bottom: 1.5rem; }
    .clock-main { font-size: 56px; font-weight: 500; color: #1a237e; letter-spacing: 2px; font-variant-numeric: tabular-nums; line-height: 1.1; }
    .clock-sub { font-size: 20px; color: #5c6bc0; margin-top: 2px; font-variant-numeric: tabular-nums; }
    .status-row { display: flex; gap: 8px; margin-bottom: 1.25rem; flex-wrap: wrap; }
    .stat-card { flex: 1; min-width: 80px; background: #e8eaf6; border-radius: 8px; padding: 10px 12px; border: 1px solid #c5cae9; }
    .stat-label { font-size: 11px; color: #3f51b5; margin-bottom: 4px; }
    .stat-value { font-size: 14px; font-weight: 500; color: #1a237e; font-variant-numeric: tabular-nums; }
    .stat-value.good { color: #2e7d32; }
    .stat-value.warn { color: #f57c00; }
    .stat-value.bad  { color: #c62828; }
    .controls { background: #fff; border: 1px solid #ddd; border-radius: 12px; padding: 1rem 1.25rem; margin-bottom: 1rem; }
    .ctrl-row { display: flex; align-items: center; gap: 12px; margin-bottom: 12px; }
    .ctrl-label { font-size: 13px; color: #666; min-width: 68px; }
    .ctrl-row input[type=range], .ctrl-row input[type=number] { flex: 1; }
    .ctrl-val { font-size: 13px; font-weight: 500; min-width: 36px; text-align: right; }
    .toggle-btn { width: 100%; padding: 12px; border-radius: 8px; font-size: 15px; font-weight: 500; cursor: pointer; background: #fff; border: 1px solid #ccc; }
    .toggle-btn.active { background: #e3f2fd; color: #1976d2; border-color: #1976d2; }
    .sync-btn { padding: 6px 14px; font-size: 13px; cursor: pointer; border-radius: 6px; background: #3f51b5; color: white; border: none; }
    .sync-btn:disabled { background: #9fa8da; }
    .chime-ind { text-align: center; font-size: 13px; color: #666; margin-top: 0.75rem; min-height: 20px; }
    .chime-ind.active { color: #1D9E75; font-weight: 700; }
    .log-area { background: #f5f5f5; border-radius: 6px; padding: 10px; font-size: 11px; color: #555; font-family: monospace; height: 120px; overflow-y: auto; white-space: pre-wrap; margin-top: 10px; border: 1px solid #ddd; }
  </style>
</head>
<body>
<div id="app">
  <div class="clock-display">
    <div class="clock-main" id="clock-main">--:--:--</div>
    <div class="clock-sub" id="clock-sub">.0</div>
  </div>
  <div class="status-row">
    <div class="stat-card">
      <div class="stat-label">最小RTT</div>
      <div class="stat-value" id="rtt-val">--</div>
    </div>
    <div class="stat-card">
      <div class="stat-label">NICT同期</div>
      <div class="stat-value" id="sync-status">--</div>
    </div>
    <div class="stat-card">
      <div class="stat-label">推定誤差</div>
      <div class="stat-value" id="accuracy-val">--</div>
    </div>
  </div>
  <div class="controls">
    <div class="ctrl-row">
      <span class="ctrl-label">鳴らす秒</span>
      <input type="number" id="chime-sec" min="0" max="59" value="0" style="max-width:60px;">
      <button class="sync-btn" id="sync-btn" onclick="doSync()">NICT同期実行</button>
    </div>
    <div class="ctrl-row">
      <span class="ctrl-label">予告秒数</span>
      <input type="number" id="before-sec" min="0" max="30" value="3" style="max-width:60px;">
    </div>
    <div class="ctrl-row">
      <span class="ctrl-label">音量</span>
      <input type="range" id="vol" min="0" max="100" value="70">
      <span class="ctrl-val" id="vol-val">70%</span>
    </div>
    <button class="toggle-btn" id="toggle-btn" onclick="toggleChime()">時報 OFF</button>
  </div>
  <div class="chime-ind" id="chime-ind">時報を有効にしてください</div>
  <div class="log-area" id="log"></div>
</div>

<script>
let rtt = 0, offset = 0, accuracy = 0, synced = false, syncCount = 0;
let chimeEnabled = false, volume = 0.7, audioCtx = null;
let beeped = {}, lastBeepedCleanMin = -1;

function correctedNow() { return new Date(Date.now() + offset); }
function sleep(ms) { return new Promise(r => setTimeout(r, ms)); }

function getAudio() {
  if (!audioCtx) audioCtx = new (window.AudioContext || window.webkitAudioContext)();
  if (audioCtx.state === 'suspended') audioCtx.resume();
  return audioCtx;
}

function beep(freq, dur, vol) {
  const ctx = getAudio(), osc = ctx.createOscillator(), g = ctx.createGain();
  osc.connect(g); g.connect(ctx.destination);
  osc.frequency.value = freq;
  g.gain.setValueAtTime(0, ctx.currentTime);
  g.gain.linearRampToValueAtTime(vol, ctx.currentTime + 0.01);
  g.gain.setValueAtTime(vol, ctx.currentTime + dur - 0.05);
  g.gain.linearRampToValueAtTime(0, ctx.currentTime + dur);
  osc.start(); osc.stop(ctx.currentTime + dur);
}

function bong(vol) {
  const ctx = getAudio();
  [880, 1108, 1320].forEach((f, i) => {
    const osc = ctx.createOscillator(), g = ctx.createGain();
    osc.connect(g); g.connect(ctx.destination);
    osc.frequency.value = f;
    const t = ctx.currentTime + i * 0.005;
    g.gain.setValueAtTime(0, t);
    g.gain.linearRampToValueAtTime(vol * (1 - i * 0.2), t + 0.02);
    g.gain.exponentialRampToValueAtTime(0.001, t + 1.5);
    osc.start(t); osc.stop(t + 1.5);
  });
}

function addLog(msg) {
  const el = document.getElementById('log');
  el.textContent = `[${new Date().toLocaleTimeString()}] ${msg}\n` + el.textContent;
}

async function measureNICT() {
  const url = `https://ntp-a1.nict.go.jp/cgi-bin/json?${Date.now()}`;
  const t1 = performance.now();
  // NICT APIへのFetch
  const res = await fetch(url, { cache: 'no-store' });
  const data = await res.json();
  const t4 = performance.now();
  
  const measuredRtt = t4 - t1;
  const serverMs = data.st * 1000; // NICTは秒単位(小数点有)で返す
  const t1abs = Date.now() - (performance.now() - t1);
  const measuredOffset = serverMs - (t1abs + measuredRtt / 2);

  return { rtt: measuredRtt, offset: measuredOffset };
}

async function doSync() {
  const btn = document.getElementById('sync-btn');
  btn.disabled = true;
  document.getElementById('sync-status').textContent = '同期中...';
  addLog("NICTサーバーと同期を開始...");

  let samples = [];
  for (let i = 0; i < 5; i++) {
    try {
      const res = await measureNICT();
      samples.push(res);
    } catch (e) {
      addLog("通信エラー: ブラウザのCORS制限によりNICTに直接アクセスできない可能性があります。");
      break;
    }
    await sleep(100);
  }

  if (samples.length > 0) {
    samples.sort((a, b) => a.rtt - b.rtt);
    const best = samples[0];
    rtt = best.rtt;
    offset = best.offset;
    accuracy = Math.round(rtt / 2);
    synced = true;
    syncCount++;
    addLog(`同期完了: 最小RTT=${Math.round(rtt)}ms, 推定誤差=±${accuracy}ms`);
  }

  updateStatusUI();
  btn.disabled = false;
}

function updateStatusUI() {
  document.getElementById('rtt-val').textContent = synced ? Math.round(rtt) + 'ms' : '--';
  document.getElementById('sync-status').textContent = synced ? `${syncCount}回` : '未同期';
  const ac = document.getElementById('accuracy-val');
  ac.textContent = synced ? `±${accuracy}ms` : '--';
  ac.className = accuracy < 100 ? 'stat-value good' : 'stat-value warn';
}

function toggleChime() {
  chimeEnabled = !chimeEnabled;
  const btn = document.getElementById('toggle-btn');
  btn.textContent = chimeEnabled ? '時報 ON (停止はここ)' : '時報 OFF';
  btn.className = chimeEnabled ? 'toggle-btn active' : 'toggle-btn';
}

function tick() {
  const now = correctedNow();
  const s = now.getSeconds(), ms = now.getMilliseconds();
  document.getElementById('clock-main').textContent = 
    now.getHours().toString().padStart(2,'0') + ':' +
    now.getMinutes().toString().padStart(2,'0') + ':' +
    s.toString().padStart(2,'0');
  document.getElementById('clock-sub').textContent = '.' + Math.floor(ms / 100);

  if (chimeEnabled) {
    const target = parseInt(document.getElementById('chime-sec').value) || 0;
    const before = parseInt(document.getElementById('before-sec').value) || 0;
    const diff = (target - s + 60) % 60;
    const key = `${now.getMinutes()}-${s}`;

    if (diff === 0 && !beeped[key] && ms < 200) {
      beeped[key] = true; bong(volume);
      document.getElementById('chime-ind').textContent = 'ポーン！';
      document.getElementById('chime-ind').className = 'chime-ind active';
      setTimeout(() => { document.getElementById('chime-ind').className = 'chime-ind'; }, 2000);
    } else if (before > 0 && diff <= before && diff > 0 && !beeped[key] && ms < 200) {
      beeped[key] = true; beep(880, 0.1, volume * 0.5);
      document.getElementById('chime-ind').textContent = `あと ${diff} 秒...`;
    }
    if (ms > 500) beeped = {}; // 簡易クリーンアップ
  }
  requestAnimationFrame(tick);
}

document.getElementById('vol').addEventListener('input', (e) => {
  volume = e.target.value / 100;
  document.getElementById('vol-val').textContent = e.target.value + '%';
});

doSync();
requestAnimationFrame(tick);
</script>
</body>
</html>
