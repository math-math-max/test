<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>NTP Chime (GitHub Pages対応)</title>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    #app { padding: 1.5rem 1rem; max-width: 480px; margin: 0 auto; font-family: sans-serif; }
    .clock-display { text-align: center; margin-bottom: 1.5rem; }
    .clock-main { font-size: 56px; font-weight: 500; color: #333; letter-spacing: 2px; font-variant-numeric: tabular-nums; line-height: 1.1; }
    .clock-sub { font-size: 20px; color: #666; margin-top: 2px; font-variant-numeric: tabular-nums; }
    .status-row { display: flex; gap: 8px; margin-bottom: 1.25rem; flex-wrap: wrap; }
    .stat-card { flex: 1; min-width: 80px; background: #f5f5f5; border-radius: 8px; padding: 10px 12px; border: 1px solid #eee; }
    .stat-label { font-size: 11px; color: #666; margin-bottom: 4px; }
    .stat-value { font-size: 14px; font-weight: 500; color: #333; }
    .stat-value.good { color: #1D9E75; font-weight: bold; }
    .controls { background: #fff; border: 1px solid #ddd; border-radius: 12px; padding: 1rem 1.25rem; margin-bottom: 1rem; }
    .ctrl-row { display: flex; align-items: center; gap: 12px; margin-bottom: 12px; }
    .ctrl-label { font-size: 13px; color: #666; min-width: 68px; }
    .toggle-btn { width: 100%; padding: 12px; border-radius: 8px; font-size: 15px; font-weight: 500; cursor: pointer; background: #fff; border: 1px solid #ccc; }
    .toggle-btn.active { background: #e3f2fd; color: #1976d2; border-color: #1976d2; }
    .sync-btn { padding: 8px 16px; font-size: 13px; cursor: pointer; border-radius: 6px; background: #333; color: white; border: none; }
    .log-area { background: #f9f9f9; border-radius: 6px; padding: 10px; font-size: 11px; color: #777; font-family: monospace; height: 120px; overflow-y: auto; white-space: pre-wrap; margin-top: 10px; border: 1px solid #eee; }
  </style>
</head>
<body>
<div id="app">
  <div class="clock-display">
    <div class="clock-main" id="clock-main">--:--:--</div>
    <div class="clock-sub" id="clock-sub">.0</div>
  </div>
  <div class="status-row">
    <div class="stat-card"><div class="stat-label">RTT (通信往復)</div><div class="stat-value" id="rtt-val">--</div></div>
    <div class="stat-card"><div class="stat-label">内蔵時計のズレ</div><div class="stat-value" id="offset-val">--</div></div>
    <div class="stat-card"><div class="stat-label">同期回数</div><div class="stat-value" id="sync-status">0回</div></div>
  </div>
  <div class="controls">
    <div class="ctrl-row">
      <span class="ctrl-label">鳴らす秒</span>
      <input type="number" id="chime-sec" min="0" max="59" value="0" style="width:50px; padding: 4px;">
      <button class="sync-btn" onclick="doSync()">今すぐ同期</button>
    </div>
    <div class="ctrl-row">
      <span class="ctrl-label">予告秒数</span>
      <input type="number" id="before-sec" min="0" max="30" value="3" style="width:50px; padding: 4px;">
    </div>
    <div class="ctrl-row">
      <span class="ctrl-label">音量</span>
      <input type="range" id="vol" min="0" max="100" value="70">
      <span id="vol-val" style="font-size: 12px; min-width: 35px;">70%</span>
    </div>
    <button class="toggle-btn" id="toggle-btn" onclick="toggleChime()">時報 OFF</button>
  </div>
  <div class="log-area" id="log"></div>
</div>

<script>
let offset = 0, rtt = 0, syncCount = 0, volume = 0.7, audioCtx = null, chimeEnabled = false, beeped = {};

function addLog(m) { const e = document.getElementById('log'); e.textContent = `[${new Date().toLocaleTimeString()}] ${m}\n` + e.textContent; }

async function doSync() {
    addLog("同期を開始します...");
    const samples = [];
    // キャッシュ回避のためクエリパラメータにミリ秒を付与
    const url = `${location.origin}${location.pathname}?cb=${Date.now()}`;
    
    try {
        for(let i=0; i<8; i++) {
            const t1 = performance.now();
            const res = await fetch(url, { 
                method: 'HEAD',
                cache: 'no-store',
                mode: 'same-origin'
            });
            const t4 = performance.now();
            const dateStr = res.headers.get('date');
            
            if (dateStr) {
                const serverMs = new Date(dateStr).getTime();
                const currentRtt = t4 - t1;
                // ブラウザの内蔵時計（Date.now()）の絶対値
                const t1abs = Date.now() - (performance.now() - t1);
                // サーバー時刻から、「リクエスト送信時＋RTTの半分」を引いてズレを算出
                const currentOffset = serverMs - (t1abs + currentRtt / 2);
                
                if (currentRtt > 0) { // キャッシュ(0ms)を除外
                    samples.push({ offset: currentOffset, rtt: currentRtt });
                }
            }
            await new Promise(r => setTimeout(r, 150));
        }
        
        if (samples.length > 0) {
            // RTTが最も小さい（通信が安定していた）データを採用
            samples.sort((a,b) => a.rtt - b.rtt);
            rtt = samples[0].rtt;
            offset = samples[0].offset;
            syncCount++;
            addLog(`成功: RTT=${Math.round(rtt)}ms, ズレ補正=${(offset/1000).toFixed(3)}s`);
            updateUI();
        } else {
            addLog("通信は成功しましたが、有効なデータが得られませんでした。");
        }
    } catch(e) {
        addLog("エラー: ネットワーク制限により同期できません。");
    }
}

function updateUI() {
    document.getElementById('rtt-val').textContent = Math.round(rtt) + "ms";
    const offEl = document.getElementById('offset-val');
    offEl.textContent = (offset/1000).toFixed(2) + "s";
    offEl.className = "stat-value good";
    document.getElementById('sync-status').textContent = syncCount + "回完了";
}

function tick() {
    // 補正後の時刻を計算
    const now = new Date(Date.now() + offset);
    const h = now.getHours(), m = now.getMinutes(), s = now.getSeconds(), ms = now.getMilliseconds();
    
    document.getElementById('clock-main').textContent = 
        `${h.toString().padStart(2,'0')}:${m.toString().padStart(2,'0')}:${s.toString().padStart(2,'0')}`;
    document.getElementById('clock-sub').textContent = "." + Math.floor(ms/100);

    if (chimeEnabled) {
        const target = parseInt(document.getElementById('chime-sec').value);
        const before = parseInt(document.getElementById('before-sec').value);
        const diff = (target - s + 60) % 60;
        
        // 誤差を最小化するため、200ms以内のタイミングで一度だけ実行
        if (diff === 0 && !beeped[s] && ms < 200) { 
            beeped[s] = true; 
            playBong(); 
        } else if (diff <= before && diff > 0 && !beeped[s] && ms < 200) { 
            beeped[s] = true; 
            playBeep(880, 0.1); 
        }
        if (ms > 500) beeped = {};
    }
    requestAnimationFrame(tick);
}

function getAudio() { if (!audioCtx) audioCtx = new (window.AudioContext || window.webkitAudioContext)(); return audioCtx; }
function toggleChime() { 
    chimeEnabled = !chimeEnabled; 
    getAudio().resume(); 
    const b = document.getElementById('toggle-btn');
    b.textContent = chimeEnabled ? "時報 ON (停止)" : "時報 OFF"; 
    b.className = chimeEnabled ? "toggle-btn active" : "toggle-btn"; 
}
function playBeep(f, d) { 
    const c = getAudio(); const o = c.createOscillator(); const g = c.createGain(); 
    o.connect(g); g.connect(c.destination); o.frequency.value = f; 
    g.gain.setValueAtTime(volume, c.currentTime); 
    g.gain.exponentialRampToValueAtTime(0.001, c.currentTime + d); 
    o.start(); o.stop(c.currentTime + d); 
}
function playBong() { [880, 1108, 1320].forEach(f => playBeep(f, 1.5)); }

document.getElementById('vol').oninput = (e) => { 
    volume = e.target.value / 100; 
    document.getElementById('vol-val').textContent = e.target.value + '%'; 
};

doSync();
tick();
</script>
</body>
</html>
