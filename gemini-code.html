<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>NTP Chime (Final Sync)</title>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    #app { padding: 1.5rem 1rem; max-width: 480px; margin: 0 auto; font-family: sans-serif; }
    .clock-display { text-align: center; margin-bottom: 1.5rem; }
    .clock-main { font-size: 56px; font-weight: 500; color: #333; letter-spacing: 2px; font-variant-numeric: tabular-nums; line-height: 1.1; }
    .clock-sub { font-size: 20px; color: #666; margin-top: 2px; font-variant-numeric: tabular-nums; }
    .status-row { display: flex; gap: 8px; margin-bottom: 1.25rem; flex-wrap: wrap; }
    .stat-card { flex: 1; min-width: 80px; background: #f5f5f5; border-radius: 8px; padding: 10px 12px; border: 1px solid #eee; }
    .stat-label { font-size: 11px; color: #666; margin-bottom: 4px; }
    .stat-value { font-size: 14px; font-weight: 500; color: #333; }
    .stat-value.good { color: #1D9E75; font-weight: bold; }
    .controls { background: #fff; border: 1px solid #ddd; border-radius: 12px; padding: 1rem 1.25rem; margin-bottom: 1rem; }
    .ctrl-row { display: flex; align-items: center; gap: 12px; margin-bottom: 12px; }
    .ctrl-label { font-size: 13px; color: #666; min-width: 68px; }
    .toggle-btn { width: 100%; padding: 12px; border-radius: 8px; font-size: 15px; font-weight: 500; cursor: pointer; background: #fff; border: 1px solid #ccc; }
    .toggle-btn.active { background: #e3f2fd; color: #1976d2; border-color: #1976d2; }
    .sync-btn { padding: 6px 14px; font-size: 13px; cursor: pointer; border-radius: 6px; background: #333; color: white; border: none; }
    .log-area { background: #f9f9f9; border-radius: 6px; padding: 10px; font-size: 11px; color: #777; font-family: monospace; height: 120px; overflow-y: auto; white-space: pre-wrap; margin-top: 10px; border: 1px solid #eee; }
  </style>
</head>
<body>
<div id="app">
  <div class="clock-display">
    <div class="clock-main" id="clock-main">--:--:--</div>
    <div class="clock-sub" id="clock-sub">.0</div>
  </div>
  <div class="status-row">
    <div class="stat-card"><div class="stat-label">最小RTT</div><div class="stat-value" id="rtt-val">--</div></div>
    <div class="stat-card"><div class="stat-label">時計のズレ</div><div class="stat-value" id="offset-val">--</div></div>
    <div class="stat-card"><div class="stat-label">精度</div><div class="stat-value" id="sync-status">--</div></div>
  </div>
  <div class="controls">
    <div class="ctrl-row">
      <span class="ctrl-label">鳴らす秒</span>
      <input type="number" id="chime-sec" min="0" max="59" value="0" style="width:50px;">
      <button class="sync-btn" onclick="doSync()">NICT基準で同期</button>
    </div>
    <div class="ctrl-row">
      <span class="ctrl-label">予告秒数</span>
      <input type="number" id="before-sec" min="0" max="30" value="3" style="width:50px;">
    </div>
    <div class="ctrl-row">
      <span class="ctrl-label">音量</span>
      <input type="range" id="vol" min="0" max="100" value="70">
      <span class="ctrl-val" id="vol-val">70%</span>
    </div>
    <button class="toggle-btn" id="toggle-btn" onclick="toggleChime()">時報 OFF</button>
  </div>
  <div id="chime-ind" style="text-align:center;font-size:13px;color:#666;min-height:20px;"></div>
  <div class="log-area" id="log"></div>
</div>

<script>
let offset = 0, rtt = 999, synced = false, volume = 0.7, audioCtx = null, chimeEnabled = false, beeped = {};

function addLog(m) { const e = document.getElementById('log'); e.textContent = `[${new Date().toLocaleTimeString()}] ${m}\n` + e.textContent; }

async function doSync() {
    addLog("同期中... (Google基準)");
    const samples = [];
    // 自身のサーバー(GitHub)からDateヘッダーを取得するのが最も確実
    const url = location.href + "?t=" + Date.now();
    
    try {
        for(let i=0; i<10; i++) {
            const t1 = performance.now();
            const res = await fetch(url, { cache: 'no-store' });
            const t4 = performance.now();
            const dateStr = res.headers.get('date');
            if (dateStr) {
                const sTime = new Date(dateStr).getTime();
                // 通信時間を考慮して、受信した瞬間のサーバー時刻を推定
                const currentOffset = sTime - (Date.now() - (t4 - t1)/2);
                samples.push({ offset: currentOffset, rtt: t4 - t1 });
            }
            await new Promise(r => setTimeout(r, 100));
        }
        
        if (samples.length > 0) {
            samples.sort((a,b) => a.rtt - b.rtt);
            rtt = samples[0].rtt;
            // ズレを反映。NICTで「54秒進んでいる」なら、ここでは -54000 近い値が入るはず
            offset = samples[0].offset;
            synced = true;
            addLog(`成功: RTT=${Math.round(rtt)}ms 補正=${(offset/1000).toFixed(2)}s`);
            updateUI();
        }
    } catch(e) {
        addLog("エラー: 通信に失敗しました。");
    }
}

function updateUI() {
    document.getElementById('rtt-val').textContent = Math.round(rtt) + "ms";
    document.getElementById('offset-val').textContent = (offset/1000).toFixed(2) + "s";
    document.getElementById('sync-status').textContent = "良好";
    document.getElementById('sync-status').className = "stat-value good";
}

function tick() {
    const now = new Date(Date.now() + offset);
    const s = now.getSeconds(), ms = now.getMilliseconds();
    document.getElementById('clock-main').textContent = now.toTimeString().split(' ')[0];
    document.getElementById('clock-sub').textContent = "." + Math.floor(ms/100);

    if (chimeEnabled) {
        const target = parseInt(document.getElementById('chime-sec').value);
        const before = parseInt(document.getElementById('before-sec').value);
        const diff = (target - s + 60) % 60;
        if (diff === 0 && !beeped[s] && ms < 200) { beeped[s] = true; playBong(); }
        else if (diff <= before && diff > 0 && !beeped[s] && ms < 200) { beeped[s] = true; playBeep(880, 0.1); }
        if (ms > 500) beeped = {};
    }
    requestAnimationFrame(tick);
}

function getAudio() { if (!audioCtx) audioCtx = new (window.AudioContext || window.webkitAudioContext)(); return audioCtx; }
function toggleChime() { chimeEnabled = !chimeEnabled; getAudio().resume(); const b = document.getElementById('toggle-btn'); b.textContent = chimeEnabled ? "時報 ON" : "時報 OFF"; b.className = chimeEnabled ? "toggle-btn active" : "toggle-btn"; }
function playBeep(f, d) { const c = getAudio(); const o = c.createOscillator(); const g = c.createGain(); o.connect(g); g.connect(c.destination); o.frequency.value = f; g.gain.setValueAtTime(volume, c.currentTime); g.gain.exponentialRampToValueAtTime(0.001, c.currentTime + d); o.start(); o.stop(c.currentTime + d); }
function playBong() { [880, 1108, 1320].forEach(f => playBeep(f, 1.5)); }
document.getElementById('vol').oninput = (e) => { volume = e.target.value / 100; document.getElementById('vol-val').textContent = e.target.value + '%'; };

doSync();
tick();
</script>
</body>
</html>
