<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Ultimate NTP Chime (API Version)</title>
    <style>
        * { box-sizing: border-box; margin: 0; padding: 0; }
        body { background: #f0f2f5; font-family: -apple-system, "Segoe UI", sans-serif; display: flex; justify-content: center; align-items: center; min-height: 100vh; }
        #app { background: white; padding: 2rem; border-radius: 24px; box-shadow: 0 20px 40px rgba(0,0,0,0.1); width: 100%; max-width: 400px; text-align: center; }
        .clock-main { font-size: 64px; font-weight: 700; color: #1a1a1a; font-variant-numeric: tabular-nums; line-height: 1; }
        .clock-sub { font-size: 28px; color: #007bff; font-weight: 500; margin: 10px 0 25px; font-variant-numeric: tabular-nums; }
        .stats { display: grid; grid-template-columns: 1fr 1fr; gap: 12px; margin-bottom: 20px; }
        .stat-card { background: #f8f9fa; padding: 10px; border-radius: 12px; border: 1px solid #eee; }
        .stat-label { font-size: 11px; color: #666; text-transform: uppercase; margin-bottom: 4px; }
        .stat-value { font-size: 14px; font-weight: 600; color: #333; }
        .controls { border-top: 1px solid #eee; padding-top: 20px; }
        .btn { width: 100%; padding: 16px; border: none; border-radius: 12px; font-size: 16px; font-weight: 600; cursor: pointer; transition: 0.2s; margin-bottom: 12px; }
        .btn-sync { background: #1a1a1a; color: white; }
        .btn-sync:hover { background: #333; }
        .btn-chime { background: #f0f2f5; color: #444; }
        .btn-chime.active { background: #e3f2fd; color: #007bff; border: 1px solid #007bff; }
        .log { font-size: 10px; color: #999; font-family: monospace; height: 50px; overflow-y: auto; text-align: left; background: #fafafa; padding: 8px; border-radius: 8px; }
    </style>
</head>
<body>

<div id="app">
    <div class="clock-main" id="clock">--:--:--</div>
    <div class="clock-sub" id="ms">.000</div>

    <div class="stats">
        <div class="stat-card"><div class="stat-label">ズレ補正</div><div class="stat-value" id="off-val">--</div></div>
        <div class="stat-card"><div class="stat-label">通信RTT</div><div class="stat-value" id="rtt-val">--</div></div>
    </div>

    <div class="controls">
        <button class="btn btn-sync" onclick="doSync()">APIで高精度同期</button>
        <button class="btn btn-chime" id="chime-btn" onclick="toggleChime()">時報 OFF</button>
        <div class="log" id="log"></div>
    </div>
</div>

<script>
let offset = 0, chimeEnabled = false, audioCtx = null, beeped = {};

function addLog(m) {
    const el = document.getElementById('log');
    el.innerText = `[${new Date().toLocaleTimeString()}] ${m}\n` + el.innerText;
}

async function doSync() {
    addLog("API同期中...");
    // 精度を高めるため、複数回の平均ではなく「最小RTT（最速通信）」を採用する
    let bestSample = { rtt: Infinity, offset: 0 };

    try {
        for (let i = 0; i < 5; i++) {
            const t1 = performance.now();
            // 世界標準時API（CORS対応済み）
            const res = await fetch("https://worldtimeapi.org/api/timezone/Asia/Tokyo", { cache: 'no-store' });
            const data = await res.json();
            const t4 = performance.now();

            const rtt = t4 - t1;
            // APIが返した正確なISO時刻をミリ秒に変換
            const serverMs = new Date(data.datetime).getTime();
            // 受信時のローカル時刻（ミリ秒）
            const localMs = Date.now();
            
            // サーバー時刻 - (ローカル時刻 - 通信片道の推定時間)
            const currentOffset = serverMs - (localMs - rtt / 2);

            if (rtt < bestSample.rtt) {
                bestSample = { rtt: rtt, offset: currentOffset };
            }
            // 連続リクエストによる負荷を避けるための待機
            await new Promise(r => setTimeout(r, 200));
        }

        offset = bestSample.offset;
        document.getElementById('off-val').innerText = (offset / 1000).toFixed(3) + "s";
        document.getElementById('rtt-val').innerText = Math.round(bestSample.rtt) + "ms";
        addLog("同期成功！精度±" + Math.round(bestSample.rtt / 2) + "ms");

    } catch (e) {
        addLog("APIエラー: " + e.message);
        addLog("GitHubに配置して試してください。");
    }
}

function tick() {
    const now = new Date(Date.now() + offset);
    const h = now.getHours(), m = now.getMinutes(), s = now.getSeconds(), ms = now.getMilliseconds();
    
    document.getElementById('clock').innerText = 
        `${h.toString().padStart(2,'0')}:${m.toString().padStart(2,'0')}:${s.toString().padStart(2,'0')}`;
    document.getElementById('ms').innerText = "." + ms.toString().padStart(3, '0');

    if (chimeEnabled) {
        // 57, 58, 59秒に予報音、0秒に正報音
        if (s === 0 && !beeped[s] && ms < 200) {
            beeped[s] = true;
            playBong();
        } else if (s >= 57 && s <= 59 && !beeped[s] && ms < 200) {
            beeped[s] = true;
            playBeep(880, 0.1);
        }
        if (ms > 500) beeped = {}; // リセット
    }
    requestAnimationFrame(tick);
}

function playBeep(f, d) {
    if (!audioCtx) audioCtx = new (window.AudioContext || window.webkitAudioContext)();
    const o = audioCtx.createOscillator(), g = audioCtx.createGain();
    o.connect(g); g.connect(audioCtx.destination);
    o.frequency.value = f;
    g.gain.setValueAtTime(0.3, audioCtx.currentTime);
    g.gain.exponentialRampToValueAtTime(0.01, audioCtx.currentTime + d);
    o.start(); o.stop(audioCtx.currentTime + d);
}

function playBong() { [880, 1108, 1320].forEach(f => playBeep(f, 1.2)); }

function toggleChime() {
    chimeEnabled = !chimeEnabled;
    if (audioCtx) audioCtx.resume();
    const btn = document.getElementById('chime-btn');
    btn.innerText = chimeEnabled ? "時報 ON" : "時報 OFF";
    btn.className = chimeEnabled ? "btn btn-chime active" : "btn btn-chime";
}

// 初回起動
doSync();
tick();
</script>
</body>
</html>
